<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"/>
    <!-- dock 窗 CSP:default 'self' + unsafe-inline(樣式);img 允許 data:;資料走 IPC。 -->
    <meta
            content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
            http-equiv="Content-Security-Policy"
    />
    <title>代辦</title>
    <style>
        /* 透明窗:整頁透明,穿透靠主進程 setIgnoreMouseEvents 控制 */
        html, body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
        }
    </style>
</head>
<body>
<div id="todo-dock-app"></div>
<script src="./main.ts" type="module"></script>
</body>
</html>
