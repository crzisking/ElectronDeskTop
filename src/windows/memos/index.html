<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"/>
    <!--
      備忘錄子視窗 CSP:
      - default 'self' + unsafe-inline 用於 Element Plus 樣式
      - 業務 API 走 IPC,本視窗不直接連外部 http
    -->
    <meta
            content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
            http-equiv="Content-Security-Policy"
    />
    <title>備忘錄</title>
</head>
<body>
<div id="memos-app"></div>
<script src="./main.ts" type="module"></script>
</body>
</html>
