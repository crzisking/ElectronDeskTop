<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"/>
    <!--
      靈感速記小窗 CSP:
      - default 'self' + unsafe-inline(樣式)
      - img-src 允許 data:(貼圖 / 縮略圖走 base64 dataURL)
      - 所有後端請求都在主進程經 IPC,本視窗不直接連外部 http
    -->
    <meta
            content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
            http-equiv="Content-Security-Policy"
    />
    <title>靈光一閃</title>
</head>
<body>
<div id="idea-app"></div>
<script src="./main.ts" type="module"></script>
</body>
</html>
