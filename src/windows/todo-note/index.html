<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"/>
    <!--
      代辦備注小窗 CSP:default 'self' + unsafe-inline(樣式);img 允許 data:;
      本窗不直接連外部,存備注走 IPC(見 todo-note.preload)。
    -->
    <meta
            content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
            http-equiv="Content-Security-Policy"
    />
    <title>備注</title>
    <style>
        /* 透明窗:整頁透明、去除滾動條(卡片自己畫圓角) */
        html, body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
        }
    </style>
</head>
<body>
<div id="todo-note-app"></div>
<script src="./main.ts" type="module"></script>
</body>
</html>
