<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <!--
      日誌查看器 CSP:
      - default 'self' + unsafe-inline 用於 Element Plus 樣式
      - 不需外部連線(此視窗只 IPC 查本機 DB)
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
    />
    <title>日誌查看器</title>
  </head>
  <body>
    <div id="log-viewer-app"></div>
    <script type="module" src="./log-viewer/main.ts"></script>
  </body>
</html>
